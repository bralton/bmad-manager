name: 'CI'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Check TypeScript
        run: npm run check

      - name: Run frontend tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 7

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy lints
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  # Security scanning job
  security:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install frontend dependencies
        run: npm install

      - name: Run cargo audit
        working-directory: src-tauri
        run: cargo audit
        continue-on-error: false

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true # npm audit may report issues without breaking build

  # E2E Tests using WebdriverIO + tauri-driver
  # Runs on Linux only (macOS lacks WKWebView driver support)
  e2e:
    runs-on: ubuntu-22.04
    needs: test # Only run E2E if unit tests pass
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Cache tauri-driver
        id: cache-tauri-driver
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-${{ runner.os }}-v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            webkit2gtk-driver \
            xvfb

      - name: Install tauri-driver
        if: steps.cache-tauri-driver.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --locked

      - name: Install frontend dependencies
        run: npm install

      - name: Pre-cache bmad-method for E2E init test
        run: npx bmad-method@6 --help || true

      - name: Build debug binary for E2E tests
        run: npm run build:e2e-app

      - name: Verify debug binary exists
        run: |
          ls -la src-tauri/target/debug/bmad-manager || echo "Binary not found!"
          file src-tauri/target/debug/bmad-manager || true

      - name: Run E2E tests with Xvfb
        run: |
          # Start Xvfb on display :99
          Xvfb :99 -screen 0 1280x1024x24 &
          XVFB_PID=$!
          export DISPLAY=:99
          echo "Xvfb started with PID: $XVFB_PID, DISPLAY=$DISPLAY"
          sleep 2

          # Start tauri-driver with the display available
          echo "Starting tauri-driver..."
          ~/.cargo/bin/tauri-driver &
          DRIVER_PID=$!
          echo "tauri-driver PID: $DRIVER_PID"
          sleep 3

          # Verify tauri-driver is running and listening
          ps aux | grep tauri-driver | grep -v grep || echo "tauri-driver not running!"
          curl -s http://127.0.0.1:4444/status || echo "Status check failed"

          # Run E2E tests
          npm run test:e2e

          # Cleanup
          kill $DRIVER_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true
        env:
          SKIP_TAURI_DRIVER_SPAWN: true

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e-results/
          retention-days: 7
