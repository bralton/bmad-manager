name: 'Release'

on:
  push:
    tags:
      - 'v*'

jobs:
  # Verify versions match before building
  verify-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version consistency
        run: |
          CARGO_VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAURI_VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9.]*\)".*/\1/')
          NPM_VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"\([0-9.]*\)".*/\1/')

          echo "Cargo.toml version: $CARGO_VERSION"
          echo "tauri.conf.json version: $TAURI_VERSION"
          echo "package.json version: $NPM_VERSION"

          if [ "$CARGO_VERSION" != "$TAURI_VERSION" ] || [ "$CARGO_VERSION" != "$NPM_VERSION" ]; then
            echo "::error::Version mismatch! All versions must match."
            echo "  Cargo.toml: $CARGO_VERSION"
            echo "  tauri.conf.json: $TAURI_VERSION"
            echo "  package.json: $NPM_VERSION"
            exit 1
          fi

          echo "✅ All versions match: $CARGO_VERSION"

  publish-tauri:
    needs: verify-versions
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: 'v__VERSION__'
          releaseName: 'BMAD Manager v__VERSION__'
          releaseBody: |
            ## Installation

            Download the appropriate installer for your platform:
            - **macOS (Apple Silicon)**: `.dmg` file ending in `aarch64`
            - **macOS (Intel)**: `.dmg` file ending in `x86_64`
            - **Windows**: `.msi` installer
            - **Linux**: `.AppImage` (portable) or `.deb` (Debian/Ubuntu)

            See the [README](${{ github.server_url }}/${{ github.repository }}#readme) for usage instructions.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
